<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="lane head.ico">
  <meta charset="UTF-8">
  <title>toktimer</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      color: #fff;
	  background-image: url("toktimer.png");
	  background-repeat: no-repeat;
  	  background-attachment: fixed; 
 	  background-size: 100% 100%;
      font-family: Arial, sans-serif;
    }


    #label {
      font-size: 2vw;
      margin-bottom: 20px;
      opacity: 0.8;
	  background-color: rgba(15,15,15,0.6);
    }

    #countdown {
      font-size: 6vw;
      text-align: center;
	  background-color: rgba(15,15,15,0.6);
    }
  </style>
</head>
<body>
  <div id="label"></div>
  <div id="countdown"></div>

  <script>

	let TEST_TIME = null;


	  
    // ARRAY OF EVENTS (date + description)
    const events = [

	  {
        time: new Date("2026-07-28T08:30:00").getTime(),
        label: "TOK EXHIBITION DRAFT DUE"
      },
	
		
	  {
        time: new Date("2027-10-22T10:00:00").getTime(),
        label: "IB EXAMS PROBABLY START"
      }
      

	
      
    ];


	// TOK exclusions (holidays etc.)
	const tokExcludedRanges = [
	  {
	    start: new Date("2026-06-26"),
	    end: new Date("2026-07-22")
	  }
	];
	
	function isTokExcluded(date) {
	  return tokExcludedRanges.some(range =>
	    date >= range.start && date <= range.end
	  );
	}
	
	// Monday 22/06/2026 = Week B
	const tokCycleStart = new Date("2026-06-22");
	
	// Generate TOK periods for the next 5 years
	for (let i = 0; i < 365 * 5; i++) {
	  const date = new Date(tokCycleStart);
	  date.setDate(tokCycleStart.getDate() + i);
	
	  const weeksSinceStart = Math.floor(i / 7);
	  const isWeekB = weeksSinceStart % 2 === 0;
	
	  const day = date.getDay();
	
	  const periods = [];
	
	  if (isWeekB) {
	    // Thursday 10:55
	    if (day === 4) {
	      periods.push({ hour: 10, minute: 55 });
	    }
	
	    // Friday 13:10
	    if (day === 5) {
	      periods.push({ hour: 13, minute: 10 });
	    }
	  } else {
	    // Monday 07:30
	    if (day === 1) {
	      periods.push({ hour: 7, minute: 30 });
	    }
	
	    // Friday 13:10
	    if (day === 5) {
	      periods.push({ hour: 13, minute: 10 });
	    }
	  }
	
	  for (const p of periods) {
	    const periodDate = new Date(date);
	    periodDate.setHours(p.hour, p.minute, 0, 0);
	
	    if (!isTokExcluded(periodDate)) {
	      events.push({
			  time: periodDate.getTime(),
			  label: "NEXT TOK PERIOD"
			});
		
		   events.push({
			  time: periodDate.getTime() + (60 * 60 * 1000),
			  label: "TOK ENDS IN"
			});
	    }
	  }
	}
	
	// Sort all events chronologically
	events.sort((a, b) => a.time - b.time);


	  
    let currentIndex = 0;

    const countdownEl = document.getElementById("countdown");
    const labelEl = document.getElementById("label");

    function updateCountdown() {
      const now = TEST_TIME ?? Date.now();

   
      while (currentIndex < events.length && now >= events[currentIndex].time) {
        currentIndex++;
      }

      if (currentIndex >= events.length) {
        labelEl.innerHTML = "";
        countdownEl.innerHTML = "All events completed!";
        return;
      }

      const currentEvent = events[currentIndex];
      const diff = currentEvent.time - now;

  
      labelEl.innerHTML = currentEvent.label;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      countdownEl.innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
